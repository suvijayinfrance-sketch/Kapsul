<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Kapsul · Landing</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
html,body,#root{height:100%;margin:0}
body{font-family:var(--kp-font-sans);background:#FAF7F2}
@keyframes drift1 { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(40px,-30px) scale(1.08); } }
@keyframes drift2 { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(-30px,40px) scale(1.1); } }
@keyframes drift3 { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(20px,30px) scale(0.92); } }
.bloom1{animation:drift1 18s ease-in-out infinite}
.bloom2{animation:drift2 22s ease-in-out infinite}
.bloom3{animation:drift3 26s ease-in-out infinite}
.plexus circle{transition:r 600ms}
@keyframes pulse-node { 0%,100% { opacity:.85 } 50% { opacity:1 } }
.plexus .node{animation:pulse-node 4s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const KMark = ({size=32}) => (<div style={{width:size,height:size,borderRadius:size*0.3,background:'linear-gradient(90deg,#2563eb 0%,#06b6d4 50%,#f97316 100%)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:900,fontSize:size*0.55,letterSpacing:'-0.02em',boxShadow:'0 4px 16px rgba(37,99,235,0.18)',flexShrink:0}}>K</div>);

// La Matrice Connective — plexus K logo as inline SVG, used as a hero motif
const Plexus = () => {
  const nodes = [
    [60,40],[120,30],[80,90],[40,140],[100,150],[160,90],[150,160],[200,50],[210,140],[260,110]
  ];
  const edges = [[0,1],[0,2],[1,2],[1,5],[2,3],[2,4],[3,4],[4,6],[5,6],[5,7],[5,9],[6,8],[7,9],[8,9],[1,7],[2,5]];
  return (
    <svg viewBox="0 0 300 200" className="plexus" style={{width:'100%',height:'auto',display:'block'}}>
      <defs>
        <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stopColor="#2563eb"/><stop offset="50%" stopColor="#06b6d4"/><stop offset="100%" stopColor="#f97316"/>
        </linearGradient>
      </defs>
      {edges.map((e,i)=>(<line key={i} x1={nodes[e[0]][0]} y1={nodes[e[0]][1]} x2={nodes[e[1]][0]} y2={nodes[e[1]][1]} stroke="url(#edge)" strokeWidth="1.2" strokeOpacity=".55"/>))}
      {nodes.map((n,i)=>(<circle key={i} cx={n[0]} cy={n[1]} r={i%3===0?5:3.5} fill={i===0?'#2563eb':i===nodes.length-1?'#f97316':'#0891b2'} className="node" style={{animationDelay:`${i*0.3}s`}}/>))}
    </svg>
  );
};

function App(){
  const [role,setRole] = useState('Étudiant');
  useEffect(()=>{ const id=setTimeout(()=>window.lucide&&window.lucide.createIcons(),50); return ()=>clearTimeout(id); });

  return (<div data-screen-label="01 Landing + Login" style={{minHeight:'100vh',position:'relative',overflow:'hidden',color:'#0f172a',background:'linear-gradient(160deg,#FFF1E0 0%,#FAF7F2 40%,#EEF4FE 100%)'}}>

    {/* Soft architectural blooms */}
    <div className="bloom1" style={{position:'absolute',top:'-10%',left:'-5%',width:640,height:640,background:'radial-gradient(circle,#FED7AA 0%,rgba(254,215,170,0) 65%)',pointerEvents:'none'}}/>
    <div className="bloom2" style={{position:'absolute',top:'30%',right:'-8%',width:560,height:560,background:'radial-gradient(circle,#BFDBFE 0%,rgba(191,219,254,0) 65%)',pointerEvents:'none'}}/>
    <div className="bloom3" style={{position:'absolute',bottom:'-15%',left:'30%',width:520,height:520,background:'radial-gradient(circle,#A5F3FC 0%,rgba(165,243,252,0) 65%)',pointerEvents:'none'}}/>

    {/* Faint dotted graph paper, only top half */}
    <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(rgba(15,23,42,.06) 1px, transparent 1px)',backgroundSize:'24px 24px',maskImage:'linear-gradient(to bottom,#000 0%,transparent 70%)',WebkitMaskImage:'linear-gradient(to bottom,#000 0%,transparent 70%)',pointerEvents:'none'}}/>

    {/* Header */}
    <header style={{position:'relative',zIndex:3,padding:'24px 40px',display:'flex',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}><KMark size={36}/><span style={{fontWeight:900,fontSize:22,letterSpacing:'-0.03em',color:'#0f172a'}}>Kapsul</span></div>
      <div style={{flex:1}}/>
      <nav style={{display:'flex',gap:28,fontSize:14,color:'rgba(15,23,42,.7)',fontWeight:500}}>
        <span>Plateforme</span><span>Sécurité</span><span>Tarifs</span><span>Pour les institutions</span>
      </nav>
      <div style={{flex:1}}/>
      <span style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.7)',backdropFilter:'blur(12px)',border:'1px solid rgba(15,23,42,.08)',padding:'6px 12px',borderRadius:9999,fontSize:12,fontWeight:600,color:'#334155'}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#10b981'}}/>SecNumCloud
      </span>
    </header>

    {/* Hero */}
    <main style={{position:'relative',zIndex:3,maxWidth:1280,margin:'40px auto 0',padding:'0 40px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1.15fr 1fr',gap:60,alignItems:'center'}}>
        <div>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.7)',backdropFilter:'blur(12px)',border:'1px solid rgba(15,23,42,.06)',padding:'6px 14px',borderRadius:9999,fontSize:12,fontWeight:600,marginBottom:24,color:'#475569'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#06b6d4'}}/>Pour l'enseignement supérieur
          </div>
          <h1 style={{margin:'0 0 22px',fontWeight:800,fontSize:72,lineHeight:1.02,letterSpacing:'-0.03em',color:'#0f172a'}}>
            L'infrastructure
            <br/>
            <span style={{position:'relative',display:'inline-block'}}>
              <span style={{background:'linear-gradient(90deg,#2563eb 0%,#06b6d4 50%,#f97316 100%)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent'}}>ambitieuse</span>
              <svg width="100%" height="14" viewBox="0 0 300 14" preserveAspectRatio="none" style={{position:'absolute',left:0,bottom:-6,height:14}}><path d="M2,10 Q80,2 150,7 T298,5" stroke="url(#u)" strokeWidth="3" fill="none" strokeLinecap="round"/><defs><linearGradient id="u" x1="0" x2="1"><stop offset="0" stopColor="#2563eb"/><stop offset=".5" stopColor="#06b6d4"/><stop offset="1" stopColor="#f97316"/></linearGradient></defs></svg>
            </span>
            <br/>pour l'IA.
          </h1>
          <p style={{margin:'0 0 32px',fontSize:18,color:'rgba(15,23,42,.7)',lineHeight:1.6,maxWidth:540}}>
            L'espace de travail unifié et souverain dédié à l'enseignement supérieur. Centralisez LMS, Microsoft 365, Notion et plus, autour d'un agent IA puissant.
          </p>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:28}}>
            <button style={{display:'inline-flex',alignItems:'center',gap:8,background:'#0f172a',color:'#fff',border:'none',padding:'14px 22px',borderRadius:14,fontWeight:600,fontSize:15,fontFamily:'inherit',cursor:'pointer',boxShadow:'0 8px 20px -4px rgba(15,23,42,.25)'}}>
              Demander une démo<i data-lucide="arrow-right" style={{width:16,height:16}}/>
            </button>
            <button style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.8)',color:'#0f172a',border:'1px solid rgba(15,23,42,.08)',padding:'14px 22px',borderRadius:14,fontWeight:600,fontSize:15,fontFamily:'inherit',cursor:'pointer',backdropFilter:'blur(12px)'}}>
              <i data-lucide="play" style={{width:14,height:14}}/>Voir Kapsul en 90s
            </button>
          </div>
          <div style={{display:'flex',gap:24,fontSize:13,color:'rgba(15,23,42,.55)',flexWrap:'wrap'}}>
            {['SecNumCloud · ANSSI','RGPD natif','Zero-Training API','Hébergement souverain'].map((b,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8}}><i data-lucide="check" style={{width:14,height:14,color:'#10b981'}}/>{b}</div>
            ))}
          </div>
        </div>

        {/* Visual collage: plexus card + login card stacked */}
        <div style={{position:'relative'}}>
          {/* Plexus glass card behind */}
          <div style={{position:'absolute',top:-18,left:-18,right:18,bottom:18,background:'linear-gradient(135deg,rgba(37,99,235,.06),rgba(249,115,22,.06))',border:'1px solid rgba(15,23,42,.06)',borderRadius:28,backdropFilter:'blur(8px)',padding:24,zIndex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#475569'}}><span style={{width:6,height:6,borderRadius:'50%',background:'#10b981'}}/>La matrice connective</div>
            <Plexus/>
          </div>

          {/* Login card */}
          <div style={{position:'relative',zIndex:2,background:'rgba(255,255,255,.92)',backdropFilter:'blur(20px)',border:'1px solid rgba(15,23,42,.06)',borderRadius:24,padding:30,boxShadow:'0 30px 60px -20px rgba(15,23,42,.18)',marginTop:90,marginLeft:24}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:22}}><KMark size={32}/><div><div style={{fontWeight:700,fontSize:14,color:'#0f172a'}}>Bienvenue sur Kapsul</div><div style={{fontSize:12,color:'#64748b'}}>Connectez-vous avec votre établissement</div></div></div>
            <div style={{display:'flex',background:'#f1f5f9',borderRadius:12,padding:3,marginBottom:18}}>
              {['Étudiant','Professeur','Admin'].map(r=>(<button key={r} onClick={()=>setRole(r)} style={{flex:1,background:role===r?'#fff':'transparent',color:role===r?'#0f172a':'#64748b',border:'none',padding:'8px 0',borderRadius:9,fontWeight:600,fontSize:13,fontFamily:'inherit',cursor:'pointer',boxShadow:role===r?'0 1px 2px rgba(15,23,42,.04)':'none'}}>{r}</button>))}
            </div>
            <button style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:10,background:'#0f172a',color:'#fff',border:'none',padding:'14px',borderRadius:12,fontWeight:600,fontSize:14,fontFamily:'inherit',cursor:'pointer',marginBottom:10}}>
              <svg width="16" height="16" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
              Continuer avec Microsoft Entra ID
            </button>
            <button style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:10,background:'transparent',color:'#334155',border:'1px solid #e2e8f0',padding:'12px',borderRadius:12,fontWeight:500,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
              <i data-lucide="key-round" style={{width:14,height:14}}/>Connexion SAML institutionnelle
            </button>
            <div style={{textAlign:'center',marginTop:18,fontSize:12,color:'#94a3b8'}}>En te connectant, tu acceptes la <span style={{color:'#2563eb'}}>charte numérique</span> de ton établissement.</div>
          </div>
        </div>
      </div>

      {/* Trust strip */}
      <div style={{marginTop:80,padding:'24px 0',borderTop:'1px solid rgba(15,23,42,.06)',borderBottom:'1px solid rgba(15,23,42,.06)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:24}}>
        <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#94a3b8'}}>Déployé dans</span>
        {['Sciences Po','Sorbonne Université','HEC Paris','EPF','Université Lyon 1','INSA'].map((u,i)=>(
          <span key={i} style={{fontSize:15,fontWeight:600,color:'rgba(15,23,42,.45)',letterSpacing:'-0.01em'}}>{u}</span>
        ))}
      </div>

      {/* Feature cards */}
      <div style={{marginTop:48,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[
          {i:'sparkles',t:'Smart Routing',d:'Le bon modèle pour la bonne tâche, automatiquement.',c:'#2563eb',bg:'#eff6ff',bd:'#dbeafe'},
          {i:'database',t:'Hub RAG souverain',d:'Le corpus de votre établissement, sans entraîner les modèles publics.',c:'#0891b2',bg:'#ecfeff',bd:'#a5f3fc'},
          {i:'shield-check',t:'Privacy Firewall',d:'Anonymisation et contrôle des données à chaque requête.',c:'#ea580c',bg:'#fff7ed',bd:'#fed7aa'},
        ].map((c,i)=>(
          <div key={i} style={{padding:24,borderRadius:20,background:'rgba(255,255,255,.78)',border:'1px solid rgba(15,23,42,.06)',backdropFilter:'blur(10px)',boxShadow:'0 1px 2px rgba(15,23,42,.03)'}}>
            <div style={{width:42,height:42,borderRadius:12,background:c.bg,border:`1px solid ${c.bd}`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}><i data-lucide={c.i} style={{width:20,height:20,color:c.c}}/></div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6,color:'#0f172a',letterSpacing:'-0.01em'}}>{c.t}</div>
            <div style={{fontSize:13,color:'#64748b',lineHeight:1.55}}>{c.d}</div>
          </div>
        ))}
      </div>

      <div style={{height:60}}/>
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
