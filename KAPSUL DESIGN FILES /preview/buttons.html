<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px;flex-wrap:wrap">
    <button style="background:var(--kp-blue-600);color:#fff;border:none;padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;box-shadow:0 8px 16px -4px rgba(37,99,235,.3);cursor:pointer">Se connecter</button>
    <button style="background:var(--kp-blue-700);color:#fff;border:none;padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;box-shadow:0 4px 8px -2px rgba(37,99,235,.4);cursor:pointer">hover</button>
    <button style="background:#fff;color:var(--kp-fg-2);border:1px solid var(--kp-slate-200);padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer">Annuler</button>
    <button style="background:var(--kp-slate-50);color:var(--kp-fg-2);border:1px solid var(--kp-slate-200);padding:10px 20px;border-radius:12px;font-weight:500;font-size:14px;font-family:inherit;cursor:pointer">Tertiary</button>
    <button style="background:var(--kp-orange-500);color:#fff;border:none;padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;box-shadow:0 4px 12px -2px rgba(249,115,22,.3);cursor:pointer">Pousser sur Moodle</button>
  </div>
  <div class="row" style="gap:10px;margin-top:14px">
    <button style="background:transparent;color:var(--kp-fg-3);border:none;padding:8px 12px;border-radius:8px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">Ghost</button>
    <button style="background:#FEF2F2;color:#DC2626;border:none;padding:8px 12px;border-radius:8px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">Se déconnecter</button>
    <button style="background:var(--kp-blue-50);color:var(--kp-blue-600);border:none;padding:8px 12px;border-radius:8px;font-weight:600;font-size:13px;font-family:inherit;cursor:pointer">+ Nouveau cours</button>
  </div>
</div></body></html>
