<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px">
    <div style="display:flex;align-items:flex-start;gap:10px;max-width:280px">
      <div style="width:28px;height:28px;border-radius:9999px;background:var(--kp-slate-200);flex-shrink:0"></div>
      <div style="background:var(--kp-slate-100);border-radius:18px;padding:10px 14px;font-size:14px;color:var(--kp-fg-2);line-height:1.5">Comment optimiser mon mémoire ?</div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:10px;max-width:280px;margin-left:auto">
      <div style="width:28px;height:28px;border-radius:8px;background:var(--kp-gradient-energy);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0">K</div>
      <div style="background:#fff;border:1px solid var(--kp-slate-100);border-radius:18px;padding:10px 14px;font-size:14px;color:var(--kp-fg-2);line-height:1.5;box-shadow:0 1px 2px rgba(15,23,42,.04)">Avec plaisir. Quel est le sujet de ton mémoire ?</div>
    </div>
  </div>
  <div class="kicker" style="margin-top:14px">Bubbles · rounded-2xl · user slate-100 · AI white + K mark</div>
</div></body></html>
