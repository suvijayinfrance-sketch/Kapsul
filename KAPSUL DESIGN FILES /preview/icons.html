<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head><body>
<div class="card">
  <div class="row" style="gap:18px;color:var(--kp-fg-2)">
    <i data-lucide="search" style="width:20px;height:20px;color:var(--kp-fg-3)"></i>
    <i data-lucide="message-square" style="width:20px;height:20px;color:var(--kp-blue-600)"></i>
    <i data-lucide="sparkles" style="width:20px;height:20px;color:var(--kp-blue-600)"></i>
    <i data-lucide="layout-dashboard" style="width:20px;height:20px;color:var(--kp-fg-2)"></i>
    <i data-lucide="folder" style="width:20px;height:20px;color:var(--kp-fg-2)"></i>
    <i data-lucide="users" style="width:20px;height:20px;color:#059669"></i>
    <i data-lucide="bar-chart-3" style="width:20px;height:20px;color:#A855F7"></i>
    <i data-lucide="check-circle-2" style="width:20px;height:20px;color:#10B981"></i>
    <i data-lucide="alert-triangle" style="width:20px;height:20px;color:var(--kp-orange-500)"></i>
    <i data-lucide="settings" style="width:20px;height:20px;color:var(--kp-fg-3)"></i>
    <i data-lucide="upload-cloud" style="width:20px;height:20px;color:var(--kp-fg-2)"></i>
    <i data-lucide="bot" style="width:20px;height:20px;color:var(--kp-blue-600)"></i>
  </div>
  <div class="kicker" style="margin-top:14px">Lucide · stroke 2px · 20px nav size · domain-coloured</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
