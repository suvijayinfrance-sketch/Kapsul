<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="background:#fff;border:1px solid var(--kp-slate-100);border-radius:24px;padding:14px 18px;box-shadow:0 8px 30px rgba(0,0,0,.04);max-width:560px">
    <div style="font-size:14px;color:var(--kp-fg-3);margin-bottom:14px">Pose une question ou colle un lien…</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;gap:6px">
        <div style="width:28px;height:28px;border-radius:8px;background:var(--kp-slate-50);display:flex;align-items:center;justify-content:center;color:var(--kp-fg-3);font-size:14px">+</div>
        <div style="background:var(--kp-blue-50);color:var(--kp-blue-600);padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase">Smart</div>
        <div style="background:#ECFDF5;color:#059669;padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px"><span style="width:6px;height:6px;background:#10B981;border-radius:50%"></span>RAG</div>
      </div>
      <div style="width:32px;height:32px;border-radius:9999px;background:var(--kp-blue-600);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(37,99,235,.3)">↑</div>
    </div>
  </div>
  <div class="kicker" style="margin-top:10px">Composer · rounded-3xl · floating shadow · inline mode pills</div>
</div></body></html>
