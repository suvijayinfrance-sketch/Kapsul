<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;background:var(--kp-sidebar);border:1px solid var(--kp-slate-200);border-radius:16px;padding:12px;flex-direction:column;gap:4px;width:240px">
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.04);border:1px solid var(--kp-slate-100)">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--kp-blue-600)">●</span>
      <span style="font-size:14px;font-weight:600;color:var(--kp-blue-600)">Hub</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:var(--kp-fg-3)">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center">○</span>
      <span style="font-size:14px;font-weight:500">Chat AI</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:var(--kp-fg-3)">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center">○</span>
      <span style="font-size:14px;font-weight:500">Mes classes</span>
    </div>
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--kp-fg-4);padding:14px 10px 6px">Studio créatif</div>
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:var(--kp-fg-3)">
      <span style="width:18px;height:18px;border-radius:4px;background:#A855F7;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">C</span>
      <span style="font-size:14px;font-weight:500">Canva</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:var(--kp-fg-3)">
      <span style="width:18px;height:18px;border-radius:4px;background:#EA580C;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">P</span>
      <span style="font-size:14px;font-weight:500">PowerPoint</span>
    </div>
  </div>
</div></body></html>
