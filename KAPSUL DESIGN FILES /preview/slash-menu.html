<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="background:#fff;border:1px solid var(--kp-slate-100);border-radius:16px;padding:8px;width:280px;box-shadow:0 8px 30px rgba(0,0,0,.08)">
    <div style="padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--kp-fg-4)">Slash commands</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--kp-blue-50)">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:ui-monospace,monospace;color:var(--kp-blue-600);font-weight:600;font-size:13px">/Chercher</span>
      </div>
      <span style="font-size:11px;color:var(--kp-fg-3);font-family:ui-monospace,monospace">74%</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px">
      <span style="font-family:ui-monospace,monospace;color:var(--kp-fg-2);font-weight:500;font-size:13px">/Corriger</span>
      <span style="font-size:11px;color:var(--kp-fg-3);font-family:ui-monospace,monospace">52%</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px">
      <span style="font-family:ui-monospace,monospace;color:var(--kp-fg-2);font-weight:500;font-size:13px">/Traduire</span>
      <span style="font-size:11px;color:var(--kp-fg-3);font-family:ui-monospace,monospace">38%</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px">
      <span style="font-family:ui-monospace,monospace;color:var(--kp-fg-2);font-weight:500;font-size:13px">/Tuteur</span>
      <span style="font-size:11px;color:var(--kp-fg-3);font-family:ui-monospace,monospace">21%</span>
    </div>
  </div>
</div></body></html>
