<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:var(--kp-success-500)"></div><span class="name">Success</span><span class="hex">#10B981</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-warn-500)"></div><span class="name">Warning</span><span class="hex">#F97316</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-danger-500)"></div><span class="name">Danger</span><span class="hex">#EF4444</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-info-600)"></div><span class="name">Info</span><span class="hex">#2563EB</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-tool-canva)"></div><span class="name">Canva</span><span class="hex">#A855F7</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-tool-excel)"></div><span class="name">Excel</span><span class="hex">#16A34A</span></div>
    <div class="swatch"><div class="chip" style="background:var(--kp-tool-gamma)"></div><span class="name">Gamma</span><span class="hex">#F59E0B</span></div>
  </div>
</div></body></html>
