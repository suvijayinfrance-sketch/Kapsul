<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:#fafafa">
  <div class="row" style="gap:24px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:48px;background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,23,42,.04)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">xs · cards</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:48px;background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">sm · default</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:48px;background:#fff;border-radius:12px;box-shadow:0 4px 8px -2px rgba(15,23,42,.05),0 2px 4px -2px rgba(15,23,42,.05)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">md · hover</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:48px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.08)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">lg · float</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:48px;background:var(--kp-blue-600);border-radius:12px;box-shadow:0 8px 16px -4px rgba(37,99,235,.4)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">cta · tinted</span>
    </div>
  </div>
</div></body></html>
