<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;background:#fff;border:1px solid var(--kp-slate-200);border-radius:14px;padding:4px;width:fit-content">
    <button style="background:var(--kp-blue-600);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;font-family:inherit;cursor:pointer">Génératif</button>
    <button style="background:transparent;color:var(--kp-fg-3);border:none;padding:8px 16px;border-radius:10px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">RAG Info</button>
  </div>
  <div style="display:flex;background:var(--kp-slate-50);border-radius:9999px;padding:3px;width:fit-content;margin-top:14px">
    <button style="background:#fff;color:var(--kp-fg-1);border:none;padding:6px 14px;border-radius:9999px;font-weight:600;font-size:12px;font-family:inherit;cursor:pointer;box-shadow:0 1px 2px rgba(15,23,42,.04)">Étudiant</button>
    <button style="background:transparent;color:var(--kp-fg-3);border:none;padding:6px 14px;border-radius:9999px;font-weight:500;font-size:12px;font-family:inherit;cursor:pointer">Professeur</button>
    <button style="background:transparent;color:var(--kp-fg-3);border:none;padding:6px 14px;border-radius:9999px;font-weight:500;font-size:12px;font-family:inherit;cursor:pointer">Admin</button>
  </div>
  <div class="kicker" style="margin-top:14px">Segmented · two scales · padded-pill style for top-level role switcher</div>
</div></body></html>
