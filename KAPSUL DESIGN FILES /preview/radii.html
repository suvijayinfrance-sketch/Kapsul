<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:32px;height:32px;border-radius:4px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span class="hex" style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">4 · xs</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:32px;height:32px;border-radius:6px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">6 · sm</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">8 · md</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:48px;height:48px;border-radius:12px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">12 · lg</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">16 · xl</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:64px;height:64px;border-radius:20px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">20 · 2xl</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:64px;height:64px;border-radius:9999px;background:var(--kp-slate-100);border:1px solid var(--kp-slate-200)"></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;color:var(--kp-fg-3)">pill</span>
    </div>
  </div>
</div></body></html>
