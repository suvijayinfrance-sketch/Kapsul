<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:40px;display:flex;gap:40px;align-items:center;background:#fff}
  .tile{width:40px;height:40px;border-radius:12px;background:var(--kp-gradient-energy);
        display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px;
        box-shadow:0 4px 12px rgba(37,99,235,.25)}
  .tile.lg{width:64px;height:64px;border-radius:16px;font-size:34px}
  .word{display:flex;align-items:center;gap:12px}
  .word span{font-family:var(--kp-font-sans);font-weight:900;font-size:30px;letter-spacing:-0.03em;color:var(--kp-fg-1)}
  .grad{background:var(--kp-gradient-energy);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head><body>
<div class="tile">K</div>
<div class="tile lg">K</div>
<div class="word"><div class="tile">K</div><span>Kapsul</span></div>
<div class="word"><div class="tile">K</div><span class="grad">Kapsul</span></div>
</body></html>
